name: Nexus Kernel CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  # ── Job 1: Lint & Type-check ──────────────────────────────────
  lint-and-typecheck:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx expo lint

  # ── Job 2: Tests ──────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm test -- --coverage --ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ── Job 3: Production Build + GitHub Release ─────────────────
  build-production:
    name: EAS Production Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.NEXUS }}

      # 1. Build and output build info to a file
      - name: Build Android APK
        run: eas build --platform android --non-interactive --profile production --json > build-info.json

      # 2. Extract the URL
      - name: Get Build URL
        id: get_url
        run: echo "BUILD_URL=$(jq -r '.[0].artifacts.buildUrl' build-info.json)" >> $GITHUB_ENV

      # 3. Download the APK
      - name: Download APK
        run: curl -L $BUILD_URL -o WardrobeAssistant.apk

      # 4. Create/Update the GitHub Release and attach the APK
      - name: Release to GitHub
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_id }}
          name: Build ${{ github.run_number }}
          files: WardrobeAssistant.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}